<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diary - SoulBook</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #ffe0f0 0%, #ffd6f0 50%, #f9c6e8 100%);
            font-family: 'Lato', sans-serif;
            padding: 20px;
        }

        .top-bar {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 28px;
        }

        .back-btn {
            text-decoration: none;
            background: white;
            color: #d63384;
            padding: 8px 18px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 14px;
            box-shadow: 0 2px 10px rgba(214,51,132,0.15);
            transition: all 0.2s;
        }
        .back-btn:hover { background: #d63384; color: white; }

        h1.page-title {
            font-family: 'Playfair Display', serif;
            color: #c2185b;
            font-size: 28px;
        }

        /* ── AUTH CARD ── */
        .auth-card {
            background: white;
            border-radius: 28px;
            padding: 48px 44px;
            max-width: 420px;
            margin: 40px auto;
            box-shadow: 0 8px 40px rgba(214,51,132,0.15);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .auth-card .lock-icon {
            font-size: 68px;
            margin-bottom: 18px;
            display: block;
        }
        .auth-card h2 {
            font-family: 'Playfair Display', serif;
            color: #c2185b;
            margin-bottom: 8px;
            font-size: 26px;
            width: 100%;
        }
        .auth-card p {
            color: #bbb;
            font-size: 14px;
            margin-bottom: 28px;
            width: 100%;
        }
        .auth-card input[type="password"] {
            width: 100%;
            display: block;
            padding: 16px 20px;
            border: 2px solid #f8bbd9;
            border-radius: 16px;
            font-size: 18px;
            outline: none;
            background: #fff9fc;
            margin-bottom: 16px;
            text-align: left;
            letter-spacing: 2px;
            transition: border 0.2s;
            color: #333;
        }
        .auth-card input[type="password"]::placeholder {
            letter-spacing: 0;
            font-size: 14px;
            color: #ccc;
        }
        .auth-card input:focus {
            border-color: #d63384;
            box-shadow: 0 0 0 4px rgba(214,51,132,0.08);
        }
        .auth-btn {
            width: 100%;
            display: block;
            background: linear-gradient(135deg, #f06292, #d63384);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 16px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(214,51,132,0.3);
            transition: all 0.2s;
            margin-top: 4px;
        }
        .auth-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(214,51,132,0.4); }
        .reset-link {
            margin-top: 18px;
            font-size: 13px;
            color: #bbb;
            cursor: pointer;
            text-decoration: underline;
            width: 100%;
            text-align: center;
        }
        .reset-link:hover { color: #d63384; }

        /* ── DIARY SECTION ── */
        .diary-section { display: none; }

        .diary-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .diary-header h2 {
            font-family: 'Playfair Display', serif;
            color: #c2185b;
            font-size: 22px;
        }
        .lock-out-btn {
            background: white;
            border: 2px solid #f8bbd9;
            color: #c2185b;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .lock-out-btn:hover { background: #d63384; color: white; border-color: #d63384; }

        .write-card {
            background: white;
            border-radius: 20px;
            padding: 28px;
            box-shadow: 0 4px 24px rgba(214,51,132,0.12);
            margin-bottom: 28px;
        }
        .write-card h3 {
            font-family: 'Playfair Display', serif;
            color: #c2185b;
            margin-bottom: 18px;
            font-size: 18px;
        }
        .write-card input[type="text"],
        .write-card select,
        .write-card textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #f8bbd9;
            border-radius: 12px;
            font-size: 15px;
            font-family: 'Lato', sans-serif;
            margin-bottom: 14px;
            outline: none;
            background: #fff9fc;
            transition: border 0.2s;
        }
        .write-card input:focus,
        .write-card select:focus,
        .write-card textarea:focus { border-color: #d63384; }
        .write-card textarea { resize: vertical; min-height: 140px; }

        .write-actions { display: flex; gap: 12px; flex-wrap: wrap; }
        .save-btn {
            background: linear-gradient(135deg, #f06292, #d63384);
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 25px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(214,51,132,0.3);
            transition: all 0.2s;
        }
        .save-btn:hover { transform: translateY(-2px); }

        /* ── ENTRIES ── */
        .entries-section h3 {
            font-family: 'Playfair Display', serif;
            color: #c2185b;
            font-size: 20px;
            margin-bottom: 16px;
        }

        .entry-card {
            background: white;
            border-radius: 18px;
            padding: 22px;
            box-shadow: 0 3px 16px rgba(214,51,132,0.1);
            margin-bottom: 16px;
            border-left: 5px solid #f06292;
            transition: transform 0.2s;
        }
        .entry-card:hover { transform: translateY(-3px); }

        .entry-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .entry-date { font-size: 12px; color: #aaa; font-weight: 600; }
        .mood-badge {
            background: #fce4ec;
            color: #c2185b;
            padding: 3px 12px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 700;
        }
        .entry-preview {
            color: #555;
            font-size: 14px;
            line-height: 1.7;
            margin-bottom: 14px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .entry-actions { display: flex; gap: 10px; }
        .read-btn {
            flex: 1;
            background: linear-gradient(135deg, #f06292, #d63384);
            color: white;
            border: none;
            padding: 9px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .read-btn:hover { opacity: 0.85; }
        .edit-btn {
            background: #fff8e1;
            color: #f59e0b;
            border: 2px solid #fde68a;
            padding: 9px 14px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .edit-btn:hover { background: #f59e0b; color: white; border-color: #f59e0b; }
        .delete-btn {
            background: #fff0f5;
            color: #e57373;
            border: 2px solid #ffcdd2;
            padding: 9px 14px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .delete-btn:hover { background: #e57373; color: white; border-color: #e57373; }

        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #c2185b;
            opacity: 0.5;
        }
        .empty-state .empty-icon { font-size: 60px; margin-bottom: 16px; }

        /* ── FULLSCREEN READER ── */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .overlay.open { display: flex; }

        /* Reader */
        .reader-modal {
            background: #fffaf7;
            border-radius: 24px;
            width: 100%;
            max-width: 780px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .reader-header {
            background: linear-gradient(135deg, #f06292, #d63384);
            padding: 20px 28px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
        }
        .reader-header-left .reader-date { color: rgba(255,255,255,0.8); font-size: 13px; margin-bottom: 4px; }
        .reader-header-left .reader-mood {
            background: rgba(255,255,255,0.25);
            color: white;
            padding: 3px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 700;
            display: inline-block;
        }
        .close-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            flex-shrink: 0;
            transition: background 0.2s;
        }
        .close-btn:hover { background: rgba(255,255,255,0.4); }
        .reader-body {
            padding: 32px;
            overflow-y: auto;
            flex: 1;
            line-height: 1.9;
            color: #333;
            white-space: pre-wrap;
            font-size: 17px;
            font-family: 'Playfair Display', serif;
        }
        .reader-footer {
            padding: 16px 28px;
            background: white;
            border-top: 2px solid #fce4ec;
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }
        .reader-edit-btn {
            background: #fff8e1;
            color: #f59e0b;
            border: 2px solid #fde68a;
            padding: 10px 24px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .reader-edit-btn:hover { background: #f59e0b; color: white; border-color: #f59e0b; }

        /* Edit Modal */
        .edit-modal {
            background: white;
            border-radius: 24px;
            width: 100%;
            max-width: 620px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 32px;
        }
        .edit-modal h2 {
            font-family: 'Playfair Display', serif;
            color: #c2185b;
            margin-bottom: 20px;
            font-size: 22px;
        }
        .edit-modal input,
        .edit-modal select,
        .edit-modal textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #f8bbd9;
            border-radius: 12px;
            font-size: 15px;
            font-family: 'Lato', sans-serif;
            margin-bottom: 14px;
            outline: none;
            background: #fff9fc;
        }
        .edit-modal input:focus,
        .edit-modal select:focus,
        .edit-modal textarea:focus { border-color: #d63384; }
        .edit-modal textarea { resize: vertical; min-height: 180px; }
        .edit-actions { display: flex; gap: 12px; }
        .update-btn {
            flex: 1;
            background: linear-gradient(135deg, #f06292, #d63384);
            color: white;
            border: none;
            padding: 13px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .update-btn:hover { opacity: 0.85; }
        .cancel-btn {
            background: #f5f5f5;
            color: #888;
            border: 2px solid #e0e0e0;
            padding: 13px 24px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
        }
        .cancel-btn:hover { background: #e0e0e0; }
    </style>
</head>
<body>

<div class="top-bar">
    <a href="index.html" class="back-btn">⬅ Back Home</a>
    <h1 class="page-title">📖 My Private Diary</h1>
</div>

<!-- SETUP PASSWORD -->
<div id="setup" class="auth-card">
    <div class="lock-icon">🔐</div>
    <h2>Create Your Password</h2>
    <p>Set a password to keep your diary private</p>
    <input type="password" id="newPass" placeholder="Create Password (min 4 chars)">
    <button class="auth-btn" onclick="savePassword()">Save Password</button>
</div>

<!-- LOGIN -->
<div id="login" class="auth-card" style="display:none;">
    <div class="lock-icon">🔑</div>
    <h2>Welcome Back</h2>
    <p>Enter your password to open your diary</p>
    <input type="password" id="passInput" placeholder="Enter Password" onkeydown="if(event.key==='Enter') checkPassword()">
    <button class="auth-btn" onclick="checkPassword()">Open Diary</button>
    <div class="reset-link" onclick="resetPassword()">Forgot password? Reset it</div>
</div>

<!-- DIARY SECTION -->
<div id="diarySection" class="diary-section">

    <div class="diary-header">
        <h2>✍️ Write Today's Entry</h2>
        <button class="lock-out-btn" onclick="lockDiary()">🔒 Lock Diary</button>
    </div>

    <!-- WRITE CARD -->
    <div class="write-card">
        <h3>💭 How are you feeling today?</h3>
        <select id="moodInput">
            <option value="Happy 😊">Happy 😊</option>
            <option value="Sad 😢">Sad 😢</option>
            <option value="Angry 😡">Angry 😡</option>
            <option value="Calm 😌">Calm 😌</option>
            <option value="Excited 🤩">Excited 🤩</option>
            <option value="Anxious 😰">Anxious 😰</option>
            <option value="Grateful 🙏">Grateful 🙏</option>
            <option value="Tired 😴">Tired 😴</option>
        </select>
        <textarea id="diaryInput" placeholder="Write your feelings here... pour your heart out 💕"></textarea>
        <div class="write-actions">
            <button class="save-btn" onclick="saveEntry()">💾 Save Entry</button>
        </div>
    </div>

    <!-- ENTRIES -->
    <div class="entries-section">
        <h3>📚 Your Diary Entries</h3>
        <div id="entriesList"></div>
    </div>
</div>

<!-- FULLSCREEN READER OVERLAY -->
<div class="overlay" id="readerOverlay">
    <div class="reader-modal">
        <div class="reader-header">
            <div class="reader-header-left">
                <div class="reader-date" id="readerDate"></div>
                <div class="reader-mood" id="readerMood"></div>
            </div>
            <button class="close-btn" onclick="closeReader()">✕</button>
        </div>
        <div class="reader-body" id="readerBody"></div>
        <div class="reader-footer">
            <button class="reader-edit-btn" onclick="openEditFromReader()">✏️ Edit Entry</button>
        </div>
    </div>
</div>

<!-- EDIT OVERLAY -->
<div class="overlay" id="editOverlay">
    <div class="edit-modal">
        <h2>✏️ Edit Entry</h2>
        <select id="editMood">
            <option value="Happy 😊">Happy 😊</option>
            <option value="Sad 😢">Sad 😢</option>
            <option value="Angry 😡">Angry 😡</option>
            <option value="Calm 😌">Calm 😌</option>
            <option value="Excited 🤩">Excited 🤩</option>
            <option value="Anxious 😰">Anxious 😰</option>
            <option value="Grateful 🙏">Grateful 🙏</option>
            <option value="Tired 😴">Tired 😴</option>
        </select>
        <textarea id="editContent" placeholder="Edit your entry..."></textarea>
        <div class="edit-actions">
            <button class="update-btn" onclick="saveEdit()">💾 Save Changes</button>
            <button class="cancel-btn" onclick="closeEdit()">Cancel</button>
        </div>
    </div>
</div>

<script>
    let entries = JSON.parse(localStorage.getItem("soulbook_diary")) || [];
    let editingIndex = -1;
    let readingIndex = -1;

    // ── AUTH ──
    let savedPass = localStorage.getItem("soulbook_pass");
    if (savedPass) {
        document.getElementById("setup").style.display = "none";
        document.getElementById("login").style.display = "flex";
    }

    function savePassword() {
        let pass = document.getElementById("newPass").value;
        if (pass.length < 4) { alert("Password must be at least 4 characters!"); return; }
        localStorage.setItem("soulbook_pass", pass);
        alert("Password saved! 🎉");
        document.getElementById("setup").style.display = "none";
        document.getElementById("login").style.display = "flex";
    }

    function checkPassword() {
        let input = document.getElementById("passInput").value;
        let saved = localStorage.getItem("soulbook_pass");
        if (input === saved) {
            document.getElementById("login").style.display = "none";
            document.getElementById("diarySection").style.display = "block";
            renderEntries();
        } else {
            alert("Wrong password! Try again 🔒");
            document.getElementById("passInput").value = "";
        }
    }

    function lockDiary() {
        document.getElementById("diarySection").style.display = "none";
        document.getElementById("login").style.display = "flex";
        document.getElementById("passInput").value = "";
    }

    function resetPassword() {
        if (confirm("This will delete your password. Are you sure?")) {
            localStorage.removeItem("soulbook_pass");
            document.getElementById("login").style.display = "none";
            document.getElementById("setup").style.display = "flex";
            document.getElementById("newPass").value = "";
        }
    }

    // ── SAVE ENTRY ──
    function saveEntry() {
        let mood = document.getElementById("moodInput").value;
        let content = document.getElementById("diaryInput").value.trim();
        if (!content) { alert("Please write something first! 💕"); return; }

        let now = new Date();
        let date = now.toLocaleDateString('en-IN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        let time = now.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });

        entries.unshift({ mood, content, date, time });
        localStorage.setItem("soulbook_diary", JSON.stringify(entries));
        document.getElementById("diaryInput").value = "";
        renderEntries();
    }

    // ── RENDER ──
    function renderEntries() {
        let list = document.getElementById("entriesList");
        if (entries.length === 0) {
            list.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><p>No entries yet — write your first one above!</p></div>`;
            return;
        }
        list.innerHTML = entries.map((entry, i) => `
            <div class="entry-card">
                <div class="entry-top">
                    <span class="entry-date">📅 ${entry.date} • ${entry.time}</span>
                    <span class="mood-badge">${entry.mood}</span>
                </div>
                <div class="entry-preview">${entry.content}</div>
                <div class="entry-actions">
                    <button class="read-btn" onclick="openReader(${i})">📖 Read</button>
                    <button class="edit-btn" onclick="openEdit(${i})">✏️ Edit</button>
                    <button class="delete-btn" onclick="deleteEntry(${i})">🗑</button>
                </div>
            </div>
        `).join('');
    }

    // ── READER ──
    function openReader(index) {
        readingIndex = index;
        let entry = entries[index];
        document.getElementById("readerDate").textContent = "📅 " + entry.date + " • " + entry.time;
        document.getElementById("readerMood").textContent = entry.mood;
        document.getElementById("readerBody").textContent = entry.content;
        document.getElementById("readerOverlay").classList.add("open");
        document.body.style.overflow = "hidden";
    }

    function closeReader() {
        document.getElementById("readerOverlay").classList.remove("open");
        document.body.style.overflow = "";
        readingIndex = -1;
    }

    function openEditFromReader() {
        closeReader();
        openEdit(readingIndex === -1 ? 0 : readingIndex);
    }

    // ── EDIT ──
    function openEdit(index) {
        editingIndex = index;
        let entry = entries[index];
        document.getElementById("editMood").value = entry.mood;
        document.getElementById("editContent").value = entry.content;
        document.getElementById("editOverlay").classList.add("open");
        document.body.style.overflow = "hidden";
    }

    function saveEdit() {
        let mood = document.getElementById("editMood").value;
        let content = document.getElementById("editContent").value.trim();
        if (!content) { alert("Please write something!"); return; }
        entries[editingIndex].mood = mood;
        entries[editingIndex].content = content;
        localStorage.setItem("soulbook_diary", JSON.stringify(entries));
        closeEdit();
        renderEntries();
    }

    function closeEdit() {
        document.getElementById("editOverlay").classList.remove("open");
        document.body.style.overflow = "";
        editingIndex = -1;
    }

    // ── DELETE ──
    function deleteEntry(index) {
        if (confirm("Delete this diary entry? This cannot be undone.")) {
            entries.splice(index, 1);
            localStorage.setItem("soulbook_diary", JSON.stringify(entries));
            renderEntries();
        }
    }

    // Close overlays on background click
    document.getElementById("readerOverlay").addEventListener("click", function(e) { if (e.target === this) closeReader(); });
    document.getElementById("editOverlay").addEventListener("click", function(e) { if (e.target === this) closeEdit(); });
</script>

</body>
</html>
