<!DOCTYPE html>
<html>
<head>
<title>Memories - SoulBook</title>

<style>
body{
    margin:0;
    font-family:Arial;
    height:100vh;
    width:100vw;
    background:linear-gradient(135deg,#ffe0f0,#d0f0ff);
    overflow:hidden;
}

/* FULL SCREEN WRAPPER */
.wrapper{
    height:100vh;
    width:100vw;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* MAIN BOX */
.container{
    width:80%;
    height:90vh;
    background:white;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    padding:20px;
    overflow-y:auto;
}

/* TITLE */
h1{
    text-align:center;
    font-size:40px;
    margin:10px 0;
}

/* INPUTS */
input, textarea{
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:16px;
}

/* BUTTON */
button{
    padding:10px 15px;
    margin:5px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#ff4d6d;
    color:white;
    font-size:14px;
}

button:hover{
    opacity:0.85;
}

/* MEMORY CARD */
.memory{
    background:#f9f9f9;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border-left:5px solid #ff4d6d;
}

/* IMPORTANT HIGHLIGHT */
.highlight{
    border-left:5px solid gold;
    background:#fff8dc;
}

/* ACTIONS */
.actions button{
    background:#333;
    font-size:12px;
}

/* SCROLL */
.container::-webkit-scrollbar{
    width:6px;
}
.container::-webkit-scrollbar-thumb{
    background:#ff4d6d;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="container">

<h1>📸 Memories Calendar</h1>

<a href="index.html">⬅ Back Home</a>

<h3>📅 Select Date</h3>
<input type="date" id="dateInput">

<h3>📝 Write Memory</h3>
<textarea id="memoryText" rows="4" placeholder="Write your memory..."></textarea>

<label>
<input type="checkbox" id="important"> ⭐ Mark as Important
</label>

<br>

<button onclick="saveMemory()">Save / Update Memory</button>

<h2>🌸 Saved Memories</h2>
<div id="memoryList"></div>

</div>

</div>

<script>
let memories = JSON.parse(localStorage.getItem("soulbook_memories")) || {};

function saveMemory(){
    let date = document.getElementById("dateInput").value;
    let text = document.getElementById("memoryText").value;
    let important = document.getElementById("important").checked;

    if(!date || !text){
        alert("Please select date and write memory!");
        return;
    }

    memories[date] = {
        text: text,
        important: important
    };

    localStorage.setItem("soulbook_memories", JSON.stringify(memories));

    clearForm();
    renderMemories();
}

function clearForm(){
    document.getElementById("dateInput").value = "";
    document.getElementById("memoryText").value = "";
    document.getElementById("important").checked = false;
}

/* RENDER */
function renderMemories(){
    let list = document.getElementById("memoryList");
    list.innerHTML = "";

    for(let date in memories){
        let mem = memories[date];

        let div = document.createElement("div");
        div.className = "memory";

        if(mem.important){
            div.classList.add("highlight");
        }

        div.innerHTML = `
            📅 <b>${date}</b><br>
            💭 ${mem.text}<br><br>

            <div class="actions">
                <button onclick="editMemory('${date}')">✏ Edit</button>
                <button onclick="deleteMemory('${date}')">🗑 Delete</button>
                <button onclick="toggleImportant('${date}')">⭐ Highlight</button>
            </div>
        `;

        list.appendChild(div);
    }
}

/* EDIT */
function editMemory(date){
    let mem = memories[date];
    document.getElementById("dateInput").value = date;
    document.getElementById("memoryText").value = mem.text;
    document.getElementById("important").checked = mem.important;
}

/* DELETE */
function deleteMemory(date){
    delete memories[date];
    localStorage.setItem("soulbook_memories", JSON.stringify(memories));
    renderMemories();
}

/* TOGGLE HIGHLIGHT */
function toggleImportant(date){
    memories[date].important = !memories[date].important;
    localStorage.setItem("soulbook_memories", JSON.stringify(memories));
    renderMemories();
}

renderMemories();
</script>

</body>
</html>
